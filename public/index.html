<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YouTube ダウンローダー</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
  <h1>YouTube ダウンローダー</h1>

  <input id="url" placeholder="YouTube URL を入力" style="width:300px;">
  <button onclick="start()">ダウンロードリンク生成</button>

  <div id="result"></div>

  <script>
    const socket = io();

    function start() {
      const url = document.getElementById("url").value;
      socket.emit("download", { url });
    }

    socket.on("done", (data) => {
      document.getElementById("result").innerHTML = `
        <p>タイトル: ${data.title}</p>
        <a href="${data.downloadUrl}" download>動画をダウンロード</a>
      `;
    });

    socket.on("error", (err) => {
      document.getElementById("result").innerHTML = `
        <p style="color:red;">エラー: ${err.error}</p>
        <pre>${err.raw || ""}</pre>
      `;
    });
  </script>
</body>
</html>
